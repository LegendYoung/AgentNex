# AgentNex Platform - Docker Compose Configuration
# 单命令一键启动：docker-compose up -d

version: '3.8'

services:
  # ==================== PostgreSQL 数据库 ====================
  postgres:
    image: postgres:15-alpine
    container_name: agentnex-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-agentnex}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agentnex123}
      POSTGRES_DB: ${POSTGRES_DB:-agentnex}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agentnex}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agentnex-network

  # ==================== 后端 API 服务 ====================
  backend:
    build:
      context: ./agent
      dockerfile: Dockerfile
    container_name: agentnex-backend
    restart: unless-stopped
    environment:
      # 数据库配置
      POSTGRES_USER: ${POSTGRES_USER:-agentnex}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agentnex123}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-agentnex}
      
      # JWT 配置
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-this-secret-key-in-production}
      
      # 超级管理员配置
      SUPER_ADMIN_EMAIL: ${SUPER_ADMIN_EMAIL:-admin@agentnex.io}
      SUPER_ADMIN_PASSWORD: ${SUPER_ADMIN_PASSWORD:-AgentNex@2026}
      
      # AI 服务配置
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY}
    volumes:
      - ./agent/data:/app/data
      - ./agent/prompts:/app/prompts
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "
        echo 'Waiting for PostgreSQL...' &&
        sleep 5 &&
        python init_examples.py &&
        uvicorn main:app --host 0.0.0.0 --port 8000
      "
    networks:
      - agentnex-network

  # ==================== 前端 Web 应用 ====================
  frontend:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: agentnex-frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - agentnex-network

# ==================== 数据卷 ====================
volumes:
  postgres_data:
    driver: local

# ==================== 网络 ====================
networks:
  agentnex-network:
    driver: bridge